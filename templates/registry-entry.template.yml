# Registry catalog entry 공통 템플릿입니다.
# type에 따라 dependencies와 conflicts가 참조할 수 있는 항목은 후속 catalog 계약에서 구체화합니다.

id: "<globally-unique-entry-id>"
type: "<stack|skill|profile>"
category: "<entry-category>"
name: "<entry-display-name>"
description: "<entry-purpose-and-responsibility>"
path: "<repository-relative-source-path>"

dependencies:
  - "<required-entry-id>"

conflicts:
  - "<incompatible-entry-id>"

tags:
  - "<search-or-classification-tag>"

status: "<draft|stable|deprecated>"
